<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang - Kelompok Kawaii</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Gradasi background 4 warna yang bergerak dinamis */
            background: linear-gradient(-45deg, #ffdee9, #b5fffc, #ffe6e6, #e0f2fe);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Kartu Utama Premium Glassmorphism */
        .welcome-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 45px;
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(42, 82, 152, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.7);
            max-width: 650px;
            width: 90%;
            z-index: 10;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardEntrance 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Efek Pantulan Cahaya Bergerak pada Kartu (Shine Effect) */
        .welcome-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: shine 6s infinite ease-in-out;
        }

        @keyframes shine {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        .welcome-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 60px -15px rgba(255, 102, 161, 0.3);
            border-color: rgba(255, 255, 255, 0.9);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(60px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Badge Atas */
        .badge {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, rgba(42, 82, 152, 0.1), rgba(255, 102, 161, 0.1));
            color: #2a5298;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 50px;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 1px solid rgba(42, 82, 152, 0.15);
        }

        /* Judul Selamat Datang */
        .title {
            font-size: 3.2rem;
            color: #2c3e50;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        /* Teks Animasi Mengetik */
        .typing-container {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        .typing-text {
            font-size: 1.35rem;
            color: #5a6b7c;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #ff66a1;
            animation: typing 4s steps(34, end) infinite alternate, blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #ff66a1; }
        }

        /* Garis Pemisah Estetik */
        .divider {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
        }

        .divider span {
            height: 5px;
            width: 70px;
            background: linear-gradient(90deg, #ff66a1, #2a5298);
            border-radius: 10px;
            position: relative;
        }

        .divider span::after {
            content: '✨';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
        }

        /* Tombol Masuk Super Dinamis */
        .enter-btn {
            display: inline-block;
            padding: 18px 50px;
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
            background: linear-gradient(45deg, #2a5298, #ff66a1, #2a5298);
            background-size: 200% auto;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(42, 82, 152, 0.3);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            letter-spacing: 0.5px;
        }

        .enter-btn:hover {
            background-position: right center;
            transform: scale(1.06) translateY(-2px);
            box-shadow: 0 20px 35px rgba(255, 102, 161, 0.4);
        }

        .enter-btn:active {
            transform: scale(0.98);
        }

        /* Partikel Latar Belakang (Bintang & Hati) */
        .shapes {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            bottom: -50px;
            animation: floatUp infinite linear;
            font-family: Arial, sans-serif;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-115vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="shapes" style="font-size: 40px; left: 10%; animation-duration: 16s; color: rgba(255,102,161,0.2);">♥</div>
    <div class="shapes" style="font-size: 25px; left: 25%; animation-duration: 12s; animation-delay: 2s; color: rgba(42,82,152,0.15);">★</div>
    <div class="shapes" style="font-size: 35px; left: 60%; animation-duration: 20s; animation-delay: 1s; color: rgba(255,255,255,0.5);">🌸</div>
    <div class="shapes" style="font-size: 20px; left: 80%; animation-duration: 14s; animation-delay: 4s; color: rgba(255,102,161,0.25);">♥</div>
    <div class="shapes" style="font-size: 45px; left: 45%; animation-duration: 18s; animation-delay: 6s; color: rgba(42,82,152,0.1);">★</div>
    <div class="shapes" style="font-size: 30px; left: 85%; animation-duration: 15s; animation-delay: 3s; color: rgba(255,255,255,0.6);">✨</div>

    <div class="welcome-card">
        <span class="badge">Interactive Web Project</span>
        <h1 class="title">Selamat Datang</h1>
        
        <div class="typing-container">
            <div class="typing-text">Di Website Resmi Kelompok 6 Kawaii</div>
        </div>
        
        <div class="divider"><span></span></div>
        
        <a href="index.html" class="enter-btn">Mulai Eksplorasi →</a>
    </div>

</body>
</html>
